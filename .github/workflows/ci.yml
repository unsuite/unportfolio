name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint + format (Biome)
        run: npx biome ci .
      - name: Typecheck
        run: npx tsc -b
      - name: Test
        run: npx vitest run
      - name: Build
        run: npx vite build
